name: Build Windows

# Windows-only 构建工作流：push 到 main 或 PR 时触发，产出 NSIS 安装包 Artifact。
# 自动适配项目类型：Node.js / Electron（npm workspaces + electron-builder）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    if: runner.os == 'Windows'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Windows: 下载 PortableGit（含 bash + coreutils），解压后裁剪，打包进安装包
      - name: Download & prune PortableGit
        run: node scripts/download-git-portable.js

      # 裁剪后实测 bash + coreutils + git 仍可运行；删错 DLL/工具时这里 fail fast
      - name: Smoke-test pruned PortableGit
        run: node scripts/smoke-git-portable.mjs vendor/git-portable

      - name: Generate Windows icon
        run: node scripts/generate-windows-icon.cjs

      - name: Build client bundles (main + preload + renderer + theme)
        run: npm run build:client

      - name: Build server bundle (win32 x64)
        run: node scripts/build-server.mjs win32 x64

      - name: Build Windows sandbox helper (x64)
        run: node scripts/build-windows-sandbox-helper.mjs x64

      - name: Build Windows installer (NSIS)
        run: npx electron-builder --win nsis --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HanaAgent-Windows-x64
          retention-days: 14
          path: |
            dist/*.exe
            dist/latest*.yml
          if-no-files-found: error
